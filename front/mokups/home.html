<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProjectFlow — Proyectos</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #010409;
      font-family: 'JetBrains Mono', monospace;
      color: #e6edf3;
    }
    input::placeholder, textarea::placeholder { color: #484f58; }
    input:focus, textarea:focus { border-color: #388bfd !important; outline: none; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    /* NAV */
    nav {
      border-bottom: 1px solid #21262d;
      background: #0d1117;
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: linear-gradient(135deg, #4a9eff, #a78bfa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
    }
    .nav-title { font-size: 14px; font-weight: 700; color: #e6edf3; }
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, #238636, #1a7f37);
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* MAIN */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* PAGE HEADER */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
    }
    .page-header h1 { font-size: 24px; font-weight: 700; color: #e6edf3; }
    .page-header p { font-size: 13px; color: #7d8590; margin-top: 6px; font-family: sans-serif; }
    .btn-new {
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      transition: background 0.15s;
    }
    .btn-new:hover { background: #2ea043; }
    .btn-new span { font-size: 16px; line-height: 1; }

    /* TOOLBAR */
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .search-wrap {
      flex: 1;
      min-width: 200px;
      position: relative;
    }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #484f58;
      font-size: 13px;
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 8px 12px 8px 30px;
      color: #e6edf3;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }
    .filters { display: flex; gap: 6px; }
    .filter-btn {
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      background: none;
      border: 1px solid transparent;
      color: #7d8590;
      cursor: pointer;
      font-family: monospace;
      transition: all 0.15s;
    }
    .filter-btn.active {
      background: #21262d;
      border-color: #30363d;
      color: #e6edf3;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* CARD */
    .card {
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px 22px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 14px;
      position: relative;
      overflow: hidden;
    }
    .card:hover { transform: translateY(-2px); }
    .card-accent {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 10px 10px 0 0;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .card-name {
      font-size: 16px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12px;
      color: #7d8590;
      line-height: 1.5;
      max-width: 280px;
    }
    .badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      margin-left: 12px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      align-items: center;
    }
    .progress-label .stories { font-size: 11px; color: #7d8590; }
    .progress-label .pct { font-size: 11px; font-weight: 700; font-family: monospace; }
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #21262d;
      border-radius: 999px;
      overflow: hidden;
      display: flex;
    }
    .progress-done { height: 100%; transition: width 0.4s; }
    .progress-wip  { height: 100%; transition: width 0.4s; opacity: 0.33; }
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tags { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
    .tag {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 20px;
      background: #161b22;
      border: 1px solid #21262d;
      color: #7d8590;
      font-family: monospace;
    }
    .tag-more { font-size: 10px; color: #7d8590; }
    .card-meta { font-size: 11px; color: #7d8590; }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 80px 24px;
      border: 1px dashed #21262d;
      border-radius: 10px;
    }
    .empty-icon { font-size: 32px; margin-bottom: 12px; }
    .empty-title { font-size: 14px; color: #e6edf3; margin-bottom: 6px; font-weight: 600; }
    .empty-sub { font-size: 12px; color: #7d8590; }

    /* MODAL OVERLAY */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000000cc;
      align-items: center;
      justify-content: center;
      z-index: 100;
      backdrop-filter: blur(4px);
    }
    .overlay.open { display: flex; }
    .modal {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 28px;
      width: 480px;
      max-width: 95vw;
      box-shadow: 0 24px 80px #000;
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }
    .modal-title { font-size: 16px; font-weight: 700; color: #e6edf3; }
    .modal-close {
      background: none;
      border: none;
      color: #7d8590;
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }
    .form-group { display: flex; flex-direction: column; gap: 16px; }
    .field label {
      font-size: 11px;
      color: #7d8590;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }
    .field input, .field textarea {
      width: 100%;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 9px 12px;
      color: #e6edf3;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
    }
    .field textarea { resize: vertical; min-height: 72px; line-height: 1.6; }
    .color-picker { display: flex; gap: 8px; }
    .color-swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      outline: 3px solid transparent;
      outline-offset: 2px;
      transition: outline 0.15s;
    }
    .color-swatch.selected { outline-color: var(--c); }
    .stack-options { display: flex; gap: 6px; flex-wrap: wrap; }
    .stack-btn {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #7d8590;
      cursor: pointer;
      font-family: monospace;
      transition: all 0.15s;
    }
    .stack-btn.active { background: var(--c-bg); border-color: var(--c); color: var(--c); }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 24px;
      justify-content: flex-end;
    }
    .btn-cancel {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      background: none;
      border: 1px solid #30363d;
      color: #7d8590;
      cursor: pointer;
    }
    .btn-create {
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: background 0.2s;
      color: #fff;
    }
    .btn-create:disabled { background: #21262d !important; color: #7d8590; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <div class="logo-icon">P</div>
    <span class="nav-title">ProjectFlow</span>
  </div>
  <div class="avatar">D</div>
</nav>

<!-- MAIN -->
<main>
  <!-- Header -->
  <div class="page-header">
    <div>
      <h1>Proyectos</h1>
      <p id="subtitle"></p>
    </div>
    <button class="btn-new" onclick="openModal()">
      <span>+</span> Nuevo proyecto
    </button>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input
        class="search-input"
        type="text"
        placeholder="Buscar proyecto..."
        id="searchInput"
        oninput="render()"
      />
    </div>
    <div class="filters" id="filters"></div>
  </div>

  <!-- Grid -->
  <div id="content"></div>
</main>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">Nuevo proyecto</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="form-group">
      <!-- Name -->
      <div class="field">
        <label>Nombre *</label>
        <input type="text" id="mName" placeholder="Mi proyecto" oninput="syncCreate()" autofocus />
      </div>
      <!-- Description -->
      <div class="field">
        <label>Descripción</label>
        <textarea id="mDesc" placeholder="¿De qué trata este proyecto?"></textarea>
      </div>
      <!-- Color -->
      <div class="field">
        <label>Color del proyecto</label>
        <div class="color-picker" id="colorPicker"></div>
      </div>
      <!-- Stack -->
      <div class="field">
        <label>Stack</label>
        <div class="stack-options" id="stackOptions"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-create" id="btnCreate" onclick="createProject()">Crear proyecto</button>
    </div>
  </div>
</div>

<script>
  // ── DATA ──────────────────────────────────────────────────────────────────
  const COLORS = ["#4a9eff","#f59e0b","#10b981","#ec4899","#a78bfa","#f97316"];
  const STACK_OPTIONS = ["React","Vue","Next.js","Node.js","Express","PostgreSQL","MySQL","Prisma","Docker","TypeScript"];
  const STATUS_LABEL = {
    active:    { label: "Activo",      color: "#238636", bg: "#1a3327" },
    completed: { label: "Completado",  color: "#4a9eff", bg: "#1a2a3a" },
    archived:  { label: "Archivado",   color: "#7d8590", bg: "#21262d" },
  };

  let projects = [
    { id:"proj-1", name:"Discipline Tracker", description:"App minimalista para trackear hábitos y disciplina diaria. Sin feature creep.", color:"#4a9eff", stack:["React","Node.js","PostgreSQL","Docker"], epics:5, stories:{total:24,done:9,inProgress:4}, updatedAt:"hace 2 horas", status:"active" },
    { id:"proj-2", name:"CoinMaster", description:"Gestor de finanzas personales con ciclos financieros custom, categorías y metas.", color:"#f59e0b", stack:["React","Prisma","PostgreSQL"], epics:7, stories:{total:38,done:38,inProgress:0}, updatedAt:"hace 3 días", status:"completed" },
    { id:"proj-3", name:"Impact", description:"Sistema de gestión para empresa de ventanas y puertas. Cotizaciones, órdenes, dealers.", color:"#10b981", stack:["React","Express","PostgreSQL"], epics:6, stories:{total:31,done:14,inProgress:7}, updatedAt:"hace 1 día", status:"active" },
    { id:"proj-4", name:"VitalCare", description:"Sistema de triage hospitalario con IA local usando Ollama. Hackathon build.", color:"#ec4899", stack:["React","Ollama","Node.js"], epics:3, stories:{total:12,done:12,inProgress:0}, updatedAt:"hace 2 semanas", status:"archived" },
  ];

  let filter = "all";
  let selectedColor = COLORS[0];
  let selectedStack = [];

  // ── RENDER ────────────────────────────────────────────────────────────────
  function counts() {
    return {
      all:       projects.length,
      active:    projects.filter(p => p.status === "active").length,
      completed: projects.filter(p => p.status === "completed").length,
      archived:  projects.filter(p => p.status === "archived").length,
    };
  }

  function render() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const c = counts();

    // subtitle
    document.getElementById("subtitle").textContent =
      `${c.active} activos · ${c.completed} completados · ${c.archived} archivados`;

    // filters
    const filterDef = [
      { key:"all",       label:`Todo (${c.all})` },
      { key:"active",    label:`Activos (${c.active})` },
      { key:"completed", label:`Completados (${c.completed})` },
      { key:"archived",  label:`Archivados (${c.archived})` },
    ];
    document.getElementById("filters").innerHTML = filterDef.map(f => `
      <button class="filter-btn ${filter === f.key ? 'active' : ''}"
              onclick="setFilter('${f.key}')">${f.label}</button>
    `).join("");

    // filter + search
    const filtered = projects.filter(p => {
      const matchFilter = filter === "all" || p.status === filter;
      const matchSearch = p.name.toLowerCase().includes(search) ||
                          p.description.toLowerCase().includes(search);
      return matchFilter && matchSearch;
    });

    const content = document.getElementById("content");

    if (filtered.length === 0) {
      content.innerHTML = `
        <div class="empty">
          <div class="empty-icon">◻</div>
          <div class="empty-title">Sin proyectos</div>
          <div class="empty-sub">${search ? `No hay resultados para "${search}"` : "Crea tu primer proyecto para empezar"}</div>
        </div>`;
      return;
    }

    content.innerHTML = `<div class="grid">${filtered.map(cardHTML).join("")}</div>`;

    // hover effects via JS (since CSS vars won't carry per-card color)
    content.querySelectorAll(".card").forEach(card => {
      const color = card.dataset.color;
      card.addEventListener("mouseenter", () => {
        card.style.borderColor = color + "80";
        card.style.boxShadow = `0 8px 32px ${color}18`;
      });
      card.addEventListener("mouseleave", () => {
        card.style.borderColor = "#21262d";
        card.style.boxShadow = "none";
      });
    });
  }

  function cardHTML(p) {
    const sc = STATUS_LABEL[p.status];
    const pct = p.stories.total ? Math.round((p.stories.done / p.stories.total) * 100) : 0;
    const doneW = p.stories.total ? (p.stories.done / p.stories.total) * 100 : 0;
    const wipW  = p.stories.total ? (p.stories.inProgress / p.stories.total) * 100 : 0;
    const extraTags = p.stack.length > 3 ? `<span class="tag-more">+${p.stack.length - 3}</span>` : "";
    return `
      <div class="card" data-color="${p.color}" onclick="alert('Abrir proyecto: ${p.name}\\n(Aquí navegarías al page con las epics)')">
        <div class="card-accent" style="background: linear-gradient(90deg, ${p.color}, ${p.color}00)"></div>
        <div class="card-header">
          <div>
            <div class="card-name">${p.name}</div>
            <div class="card-desc">${p.description}</div>
          </div>
          <div class="badge" style="color:${sc.color}; background:${sc.bg}">${sc.label}</div>
        </div>
        <div>
          <div class="progress-label">
            <span class="stories">${p.stories.done}/${p.stories.total} stories</span>
            <span class="pct" style="color:${p.color}">${pct}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-done" style="width:${doneW}%; background:${p.color}"></div>
            <div class="progress-wip"  style="width:${wipW}%;  background:${p.color}"></div>
          </div>
        </div>
        <div class="card-footer">
          <div class="tags">
            ${p.stack.slice(0,3).map(s => `<span class="tag">${s}</span>`).join("")}
            ${extraTags}
          </div>
          <div class="card-meta">${p.epics} epics · ${p.updatedAt}</div>
        </div>
      </div>`;
  }

  function setFilter(key) { filter = key; render(); }

  // ── MODAL ─────────────────────────────────────────────────────────────────
  function buildModal() {
    // color swatches
    document.getElementById("colorPicker").innerHTML = COLORS.map(c => `
      <button class="color-swatch ${c === selectedColor ? 'selected' : ''}"
              style="background:${c}; --c:${c}"
              onclick="pickColor('${c}', this)"></button>
    `).join("");

    // stack buttons
    document.getElementById("stackOptions").innerHTML = STACK_OPTIONS.map(s => `
      <button class="stack-btn ${selectedStack.includes(s) ? 'active' : ''}"
              style="--c:${selectedColor}; --c-bg:${selectedColor}22"
              onclick="toggleStack('${s}', this)">${s}</button>
    `).join("");

    syncCreate();
  }

  function openModal() {
    selectedColor = COLORS[0];
    selectedStack = [];
    document.getElementById("mName").value = "";
    document.getElementById("mDesc").value = "";
    buildModal();
    document.getElementById("overlay").classList.add("open");
    document.getElementById("mName").focus();
  }

  function closeModal() {
    document.getElementById("overlay").classList.remove("open");
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById("overlay")) closeModal();
  }

  function syncCreate() {
    const name = document.getElementById("mName").value.trim();
    const btn = document.getElementById("btnCreate");
    btn.disabled = !name;
    btn.style.background = name ? selectedColor : "#21262d";
  }

  function pickColor(c, el) {
    selectedColor = c;
    document.querySelectorAll(".color-swatch").forEach(s => s.classList.remove("selected"));
    el.classList.add("selected");
    // update stack button colors
    document.querySelectorAll(".stack-btn").forEach(b => {
      b.style.setProperty("--c", c);
      b.style.setProperty("--c-bg", c + "22");
    });
    syncCreate();
  }

  function toggleStack(s, el) {
    if (selectedStack.includes(s)) {
      selectedStack = selectedStack.filter(x => x !== s);
      el.classList.remove("active");
    } else {
      selectedStack.push(s);
      el.classList.add("active");
    }
  }

  function createProject() {
    const name = document.getElementById("mName").value.trim();
    if (!name) return;
    const desc = document.getElementById("mDesc").value.trim();
    projects.unshift({
      id: `proj-${Date.now()}`,
      name,
      description: desc,
      color: selectedColor,
      stack: [...selectedStack],
      epics: 0,
      stories: { total:0, done:0, inProgress:0 },
      updatedAt: "ahora mismo",
      status: "active",
    });
    closeModal();
    render();
  }

  // ── INIT ──────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
