<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevBoard — Discipline App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      overflow: hidden;
      height: 100vh;
    }

    /* ── SIDEBAR ─────────────────────────────────────────────── */
    #sidebar {
      width: 280px;
      background: #0d1117;
      border-right: 1px solid #21262d;
      padding: 24px 0;
      flex-shrink: 0;
      overflow-y: auto;
      height: 100vh;
    }
    .sidebar-project {
      padding: 0 20px 24px;
      border-bottom: 1px solid #21262d;
    }
    .sidebar-label {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: #7d8590;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .sidebar-project-name { font-size: 16px; font-weight: 700; color: #e6edf3; }
    .sidebar-project-stack { font-size: 12px; color: #7d8590; margin-top: 4px; }
    .sidebar-progress { margin-top: 20px; }
    .sidebar-progress-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #7d8590;
      margin-bottom: 6px;
    }
    .sidebar-progress-row span:last-child { color: #e6edf3; }
    .progress-track {
      height: 4px;
      background: #21262d;
      border-radius: 2px;
    }
    .progress-fill {
      height: 100%;
      background: #238636;
      border-radius: 2px;
      transition: width 0.3s;
    }
    .sidebar-pct { font-size: 11px; color: #7d8590; margin-top: 4px; }

    .sidebar-filter {
      padding: 16px 20px;
      border-bottom: 1px solid #21262d;
    }
    .filter-item {
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #7d8590;
      margin-bottom: 2px;
      transition: background 0.15s, color 0.15s;
    }
    .filter-item:hover { background: #161b22; color: #c9d1d9; }
    .filter-item.active { background: #21262d; color: #e6edf3; }

    .sidebar-epics { padding: 16px 20px; }
    .epic-nav-item {
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.1s;
    }
    .epic-nav-item:hover { background: #161b22; }
    .epic-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
    .epic-nav-title { font-size: 12px; color: #7d8590; flex: 1; line-height: 1.3; }
    .epic-nav-count { font-size: 11px; color: #7d8590; }

    /* ── MAIN ────────────────────────────────────────────────── */
    #main {
      flex: 1;
      overflow-y: auto;
      padding: 32px;
      height: 100vh;
    }
    .main-inner { max-width: 860px; }

    /* EPIC BLOCK */
    .epic-block { margin-bottom: 40px; }
    .epic-header {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      margin-bottom: 16px;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      transition: border-color 0.15s;
      user-select: none;
    }
    .epic-header:hover { border-color: #30363d; }
    .epic-chevron { color: #7d8590; font-size: 12px; }
    .epic-header-body { flex: 1; }
    .epic-meta { display: flex; align-items: center; gap: 10px; }
    .epic-id { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
    .epic-title { font-size: 15px; font-weight: 600; color: #e6edf3; }
    .epic-desc { font-size: 12px; color: #7d8590; margin-top: 4px; }
    .epic-stories-count { font-size: 12px; color: #7d8590; flex-shrink: 0; }

    /* STORIES LIST */
    .stories-list { padding-left: 16px; }
    .story-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .story-row:hover { border-color: #388bfd; }
    .story-row.selected { border-color: #388bfd; }
    .status-badge {
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
      cursor: pointer;
      min-width: 90px;
      text-align: center;
      user-select: none;
      transition: opacity 0.1s;
    }
    .status-badge:hover { opacity: 0.8; }
    .story-id { font-size: 11px; color: #7d8590; flex-shrink: 0; font-family: monospace; }
    .story-title { font-size: 14px; color: #e6edf3; flex: 1; }
    .story-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
    .priority-label { font-size: 11px; font-weight: 600; }
    .estimate-badge {
      font-size: 11px;
      color: #7d8590;
      background: #21262d;
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* ── DETAIL PANEL ────────────────────────────────────────── */
    #detail {
      width: 380px;
      border-left: 1px solid #21262d;
      background: #0d1117;
      overflow-y: auto;
      padding: 24px;
      flex-shrink: 0;
      height: 100vh;
      display: none;
    }
    #detail.open { display: block; }
    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .detail-epic-ref { font-size: 11px; font-weight: 700; }
    .detail-close {
      background: none;
      border: none;
      color: #7d8590;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0;
    }
    .detail-close:hover { color: #e6edf3; }
    .detail-title { font-size: 16px; font-weight: 700; color: #e6edf3; margin-bottom: 16px; line-height: 1.4; }
    .detail-meta { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .detail-badge {
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
    }
    .divider { border: none; border-top: 1px solid #21262d; margin: 20px 0; }
    .detail-section-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #7d8590;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .detail-desc { font-size: 13px; color: #c9d1d9; line-height: 1.7; margin-bottom: 20px; }
    .acceptance-item { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-start; }
    .acceptance-check { color: #238636; margin-top: 1px; flex-shrink: 0; }
    .acceptance-text { font-size: 13px; color: #c9d1d9; line-height: 1.5; }
    .stack-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
    .stack-tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      background: #161b22;
      border: 1px solid #21262d;
      color: #7d8590;
    }
    .status-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
    .status-btn {
      padding: 5px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.1s;
    }

    /* EMPTY */
    .no-stories {
      padding: 20px 16px;
      font-size: 13px;
      color: #7d8590;
      font-style: italic;
    }
  </style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sidebar-project">
    <div class="sidebar-label">Proyecto</div>
    <div class="sidebar-project-name">Discipline App</div>
    <div class="sidebar-project-stack">React · Express · PostgreSQL</div>
    <div class="sidebar-progress">
      <div class="sidebar-progress-row">
        <span>Progreso general</span>
        <span id="progressCount"></span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="sidebar-pct" id="progressPct">0% completado</div>
    </div>
  </div>

  <div class="sidebar-filter">
    <div class="sidebar-label">Filtrar por estado</div>
    <div id="filterList"></div>
  </div>

  <div class="sidebar-epics">
    <div class="sidebar-label">Épicas</div>
    <div id="epicNav"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div class="main-inner" id="epicList"></div>
</div>

<!-- DETAIL PANEL -->
<div id="detail">
  <div class="detail-top">
    <div class="detail-epic-ref" id="detailRef"></div>
    <button class="detail-close" onclick="closeDetail()">×</button>
  </div>
  <div class="detail-title" id="detailTitle"></div>
  <div class="detail-meta" id="detailMeta"></div>
  <hr class="divider" />
  <div class="detail-section-label">Descripción</div>
  <div class="detail-desc" id="detailDesc"></div>
  <div class="detail-section-label">Criterios de aceptación</div>
  <div id="detailAcceptance" style="margin-bottom:20px"></div>
  <div class="detail-section-label">Stack involucrado</div>
  <div class="stack-tags" id="detailStack"></div>
  <hr class="divider" />
  <div class="detail-section-label">Cambiar estado</div>
  <div class="status-buttons" id="detailStatusBtns"></div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const EPICS = [
  {
    id: "E1",
    title: "Configuración base del proyecto",
    color: "#4a9eff",
    description: "Setup inicial del monorepo, estructura de carpetas, tooling y configuración de entorno de desarrollo.",
    stories: [
      { id:"E1-S1", title:"Inicializar repositorio y estructura de carpetas", status:"todo", priority:"high", estimate:"1d", description:"Crear repo en GitHub. Estructura: /client (React+Vite+Tailwind), /server (Node+Express), /docker. Configurar .gitignore, README base y scripts npm en raíz.", acceptance:["Repo creado con rama main protegida","Estructura de carpetas definida","npm install funciona en raíz"], stack:["Git","npm workspaces"] },
      { id:"E1-S2", title:"Configurar Vite + React + Tailwind en /client", status:"todo", priority:"high", estimate:"0.5d", description:"Vite como bundler, React 18, Tailwind CSS v3. Configurar tailwind.config.js con colores custom de la app. Eliminar boilerplate de Vite.", acceptance:["npm run dev levanta en localhost:5173","Tailwind aplica estilos correctamente","Build de producción genera /dist sin errores"], stack:["Vite","React 18","Tailwind CSS"] },
      { id:"E1-S3", title:"Configurar Express + PostgreSQL en /server", status:"todo", priority:"high", estimate:"1d", description:"Express con estructura MVC: /routes, /controllers, /models, /middleware. Conexión a PostgreSQL con pg (node-postgres). Variables de entorno con dotenv. Script de arranque con nodemon.", acceptance:["npm run dev levanta en localhost:3001","Conexión a DB confirmada con query de prueba",".env.example documentado"], stack:["Node.js","Express","pg","dotenv","nodemon"] },
      { id:"E1-S4", title:"Dockerizar la aplicación completa", status:"todo", priority:"medium", estimate:"1d", description:"Dockerfile para client (nginx sirve /dist) y server (node). docker-compose.yml con tres servicios: client, server, postgres. Volumen persistente para datos de PostgreSQL. Variables de entorno por servicio.", acceptance:["docker-compose up levanta los tres servicios","Client accesible en puerto 80","Server accesible en puerto 3001","DB persiste datos entre reinicios"], stack:["Docker","docker-compose","nginx"] },
    ],
  },
  {
    id: "E2",
    title: "Base de datos y modelos",
    color: "#f59e0b",
    description: "Diseño del schema de PostgreSQL, migraciones y seeders. Es el cimiento de toda la lógica de negocio.",
    stories: [
      { id:"E2-S1", title:"Diseñar y crear schema de PostgreSQL", status:"todo", priority:"high", estimate:"1d", description:"Tablas: users (id, email, password_hash, created_at), blocks (id, user_id, name, time, active), daily_logs (id, user_id, date, block_id, completed), streaks (id, user_id, current_streak, longest_streak, updated_at). Relaciones con FK y constraints.", acceptance:["Schema aplicado en DB de desarrollo","Diagrama ER documentado en /docs","Constraints de integridad referencial funcionando"], stack:["PostgreSQL","SQL"] },
      { id:"E2-S2", title:"Sistema de migraciones con node-pg-migrate", status:"todo", priority:"high", estimate:"0.5d", description:"Configurar node-pg-migrate para versionar cambios al schema. Scripts npm: db:migrate, db:rollback, db:migrate:test. Las migraciones corren automáticamente al iniciar el server en producción.", acceptance:["npm run db:migrate aplica todas las migraciones","npm run db:rollback revierte la última","Migraciones son idempotentes"], stack:["node-pg-migrate"] },
      { id:"E2-S3", title:"Crear modelos de acceso a datos", status:"todo", priority:"high", estimate:"1d", description:"Capa de models con funciones puras que encapsulan queries SQL. UserModel: findById, findByEmail, create. BlockModel: findByUser, create, update, delete. LogModel: findByUserAndDate, upsert. StreakModel: get, update.", acceptance:["Cada modelo tiene funciones documentadas","No hay SQL crudo fuera de /models","Queries usan parámetros preparados (sin SQL injection)"], stack:["pg","SQL"] },
    ],
  },
  {
    id: "E3",
    title: "Autenticación JWT",
    color: "#10b981",
    description: "Sistema completo de autenticación: registro, login, tokens de acceso y refresh, middleware de protección de rutas.",
    stories: [
      { id:"E3-S1", title:"Endpoint POST /api/auth/register", status:"todo", priority:"high", estimate:"1d", description:"Recibe email y password. Valida formato con express-validator. Hashea password con bcrypt (salt rounds: 12). Inserta usuario en DB. Retorna access token (15min) y refresh token (7d). El refresh token se guarda en httpOnly cookie, el access token en el body de la respuesta.", acceptance:["Registra usuario con email único","Retorna 400 si email ya existe","Password nunca se guarda en texto plano","Retorna JWT válido"], stack:["bcrypt","jsonwebtoken","express-validator"] },
      { id:"E3-S2", title:"Endpoint POST /api/auth/login", status:"todo", priority:"high", estimate:"0.5d", description:"Recibe email y password. Busca usuario por email. Compara password con bcrypt.compare(). Si es correcto, genera nuevos access y refresh tokens con la misma estrategia que register. Retorna 401 con mensaje genérico si falla (no revelar si el email existe).", acceptance:["Login correcto retorna tokens","Login incorrecto retorna 401","Mensaje de error no diferencia email vs password incorrectos"], stack:["bcrypt","jsonwebtoken"] },
      { id:"E3-S3", title:"Endpoint POST /api/auth/refresh", status:"todo", priority:"high", estimate:"0.5d", description:"Lee el refresh token de la httpOnly cookie. Lo verifica con JWT_REFRESH_SECRET. Si es válido, genera un nuevo access token y lo retorna. Implementa rotación de refresh tokens: invalida el anterior y emite uno nuevo. Tabla refresh_tokens en DB para blacklisting.", acceptance:["Token de acceso expirado + refresh válido = nuevo access token","Refresh token usado solo puede usarse una vez (rotación)","Refresh expirado o inválido retorna 401"], stack:["jsonwebtoken","pg"] },
      { id:"E3-S4", title:"Middleware de autenticación", status:"todo", priority:"high", estimate:"0.5d", description:"Middleware authMiddleware que extrae el Bearer token del header Authorization. Lo verifica con JWT_ACCESS_SECRET. Si es válido, adjunta user.id al objeto req para que los controllers lo usen. Si es inválido o ausente, retorna 401.", acceptance:["Rutas protegidas retornan 401 sin token","req.user.id disponible en controllers protegidos","Token expirado retorna 401 con mensaje específico"], stack:["jsonwebtoken","Express middleware"] },
      { id:"E3-S5", title:"Flujo de auth en el cliente (React)", status:"todo", priority:"high", estimate:"1.5d", description:"Context de Auth con useState para el access token (en memoria, no localStorage). Formularios de login y registro con validación client-side. Axios interceptor que adjunta el token a cada request y ejecuta refresh automático si recibe 401. Rutas protegidas con ProtectedRoute component.", acceptance:["Login persiste sesión entre recargas (via refresh cookie)","Access token nunca toca localStorage","Refresh automático transparente al usuario","Logout limpia cookie y estado"], stack:["React Context","Axios","React Router"] },
    ],
  },
  {
    id: "E4",
    title: "API de bloques y registros diarios",
    color: "#8b5cf6",
    description: "CRUD de bloques personales y el sistema de logging diario. El núcleo funcional de la app.",
    stories: [
      { id:"E4-S1", title:"CRUD endpoints para bloques", status:"todo", priority:"high", estimate:"1d", description:"GET /api/blocks — lista bloques del usuario autenticado. POST /api/blocks — crea bloque (name, time). PUT /api/blocks/:id — edita name o time. DELETE /api/blocks/:id — elimina (solo si no tiene logs asociados, o soft delete). Máximo 6 bloques por usuario validado en server.", acceptance:["Todas las rutas requieren auth","Usuario solo ve y modifica sus propios bloques","Límite de 6 bloques retorna 400"], stack:["Express","pg"] },
      { id:"E4-S2", title:"Endpoints de registro diario", status:"todo", priority:"high", estimate:"1d", description:"GET /api/logs?date=YYYY-MM-DD — retorna bloques del usuario con su estado completado para esa fecha. POST /api/logs — body: {block_id, date, completed}. Hace upsert en daily_logs. Al completar/descompletar un bloque recalcula el streak y actualiza la tabla streaks.", acceptance:["Upsert funciona correctamente (no duplica registros)","Streak se recalcula en cada toggle","Date siempre se guarda en UTC"], stack:["Express","pg"] },
      { id:"E4-S3", title:"Endpoint de resumen semanal", status:"todo", priority:"medium", estimate:"1d", description:"GET /api/stats/week?date=YYYY-MM-DD — retorna para la semana que contiene esa fecha: array de 7 días con estado (completo/parcial/vacío), conteo de días 100% completados, y por cada bloque cuántos días fue completado en la semana.", acceptance:["Respuesta incluye los 7 días de lunes a domingo","Días futuros retornan estado 'pending'","Query es eficiente (no N+1)"], stack:["Express","pg","SQL agregaciones"] },
    ],
  },
  {
    id: "E5",
    title: "Frontend — Vistas principales",
    color: "#ef4444",
    description: "Implementación de las tres vistas de la app: Hoy, Semana y Configuración de bloques. Consume la API construida en E4.",
    stories: [
      { id:"E5-S1", title:"Vista Hoy — listado y toggle de bloques", status:"todo", priority:"high", estimate:"1.5d", description:"Fetch de GET /api/logs?date=hoy al cargar. Lista bloques ordenados por hora. Click en bloque llama POST /api/logs con optimistic update (toggle inmediato en UI, revert si falla). Muestra streak actual y contador X/Y completados. Diseño acorde al prototipo minimalista.", acceptance:["Toggle es instantáneo (optimistic update)","Streak se actualiza tras completar todos los bloques","Estado persiste al recargar la página"], stack:["React","Axios","Tailwind"] },
      { id:"E5-S2", title:"Vista Semana — grid y progreso por bloque", status:"todo", priority:"high", estimate:"1d", description:"Fetch de GET /api/stats/week. Grid de 7 días con estado visual (dorado=completo, gris=parcial, oscuro=vacío). Contador de días perfectos en la semana. Barra de progreso por bloque mostrando X/7 días completado.", acceptance:["Grid refleja datos reales de DB","Semana actual mostrada por defecto","Estados visuales diferenciados claramente"], stack:["React","Axios","Tailwind"] },
      { id:"E5-S3", title:"Vista Bloques — gestión de bloques personales", status:"todo", priority:"high", estimate:"1d", description:"Lista bloques existentes del usuario. Formulario de creación (nombre + hora). Eliminar bloque con confirmación. Límite de 6 bloques reforzado visualmente (ocultar form si hay 6). Cambios reflejan inmediatamente en vista Hoy.", acceptance:["CRUD de bloques funciona contra API real","Límite de 6 bloques bloqueado en UI y server","Eliminar bloque actualiza vista Hoy"], stack:["React","Axios","Tailwind"] },
    ],
  },
  {
    id: "E6",
    title: "Deploy en Raspberry Pi",
    color: "#06b6d4",
    description: "Configuración de producción: docker-compose en la Pi, Cloudflare Tunnel para exposición HTTPS, GitHub webhook para deploys automáticos.",
    stories: [
      { id:"E6-S1", title:"Configurar docker-compose de producción", status:"todo", priority:"high", estimate:"1d", description:"docker-compose.prod.yml separado del de desarrollo. Variables de entorno desde archivo .env (nunca en el compose). Restart policy: unless-stopped. Health checks para server y postgres. Volumen nombrado para datos de PostgreSQL. Imagen de client optimizada con nginx:alpine.", acceptance:["docker-compose -f docker-compose.prod.yml up -d levanta todo","Servicios se reinician automáticamente tras reboot de la Pi","Logs accesibles con docker-compose logs"], stack:["Docker","docker-compose","nginx"] },
      { id:"E6-S2", title:"Configurar Cloudflare Tunnel", status:"todo", priority:"high", estimate:"0.5d", description:"Cloudflare Tunnel apuntando al puerto 80 del contenedor client y al 3001 del server (o un solo dominio con nginx como reverse proxy interno). HTTPS automático via Cloudflare. Configurar subdominio: discipline.tudominio.com.", acceptance:["App accesible en HTTPS desde internet","Sin puertos abiertos en el router","Tunnel sobrevive reinicios (servicio systemd o contenedor)"], stack:["Cloudflare Tunnel","nginx"] },
      { id:"E6-S3", title:"Webhook de deploy automático desde GitHub", status:"todo", priority:"medium", estimate:"1d", description:"Script de deploy en la Pi: git pull, docker-compose build, docker-compose up -d con zero-downtime. Endpoint Express en un puerto interno que recibe el webhook de GitHub, valida el secret y ejecuta el script. Notificación por log cuando el deploy termina.", acceptance:["Push a main dispara deploy automático","Webhook validado con secret (no ejecuta código arbitrario)","Deploy no genera downtime visible"], stack:["bash","GitHub Webhooks","Docker"] },
    ],
  },
];

const STATUS_CONFIG = {
  todo:       { label: "Por hacer",   color: "#374151", text: "#9ca3af" },
  inprogress: { label: "En progreso", color: "#1e3a5f", text: "#60a5fa" },
  review:     { label: "En revisión", color: "#3b1f5e", text: "#a78bfa" },
  done:       { label: "Hecho",       color: "#14532d", text: "#4ade80" },
};

const PRIORITY_CONFIG = {
  high:   { label: "Alta",  color: "#ef4444" },
  medium: { label: "Media", color: "#f59e0b" },
  low:    { label: "Baja",  color: "#6b7280" },
};

// ── STATE ─────────────────────────────────────────────────────────────────────
const storyStatus = {};
EPICS.forEach(e => e.stories.forEach(s => { storyStatus[s.id] = s.status; }));

const expandedEpics = {};
EPICS.forEach(e => { expandedEpics[e.id] = true; });

let filterStatus = "all";
let selectedStoryId = null;

// ── HELPERS ───────────────────────────────────────────────────────────────────
function allStories() { return EPICS.flatMap(e => e.stories); }

function totalDone() {
  return Object.values(storyStatus).filter(s => s === "done").length;
}

function cycleStatus(id) {
  const order = ["todo", "inprogress", "review", "done"];
  const curr = storyStatus[id];
  storyStatus[id] = order[(order.indexOf(curr) + 1) % order.length];
  render();
  if (selectedStoryId === id) renderDetail();
}

function toggleEpic(id) {
  expandedEpics[id] = !expandedEpics[id];
  renderMain();
}

function selectStory(id) {
  selectedStoryId = selectedStoryId === id ? null : id;
  renderMain();
  renderDetail();
}

function closeDetail() {
  selectedStoryId = null;
  renderMain();
  renderDetail();
}

function setFilter(val) {
  filterStatus = val;
  renderSidebar();
  renderMain();
}

// ── RENDER SIDEBAR ────────────────────────────────────────────────────────────
function renderSidebar() {
  const total = allStories().length;
  const done  = totalDone();
  const pct   = Math.round((done / total) * 100);

  document.getElementById("progressCount").textContent = `${done}/${total}`;
  document.getElementById("progressFill").style.width  = `${pct}%`;
  document.getElementById("progressPct").textContent   = `${pct}% completado`;

  // filter list
  const filters = [["all","Todos"], ...Object.entries(STATUS_CONFIG).map(([k,v]) => [k,v.label])];
  document.getElementById("filterList").innerHTML = filters.map(([val, label]) =>
    `<div class="filter-item ${filterStatus === val ? 'active' : ''}" onclick="setFilter('${val}')">${label}</div>`
  ).join("");

  // epic nav
  document.getElementById("epicNav").innerHTML = EPICS.map(e => {
    const epicDone = e.stories.filter(s => storyStatus[s.id] === "done").length;
    return `
      <div class="epic-nav-item" onclick="document.getElementById('${e.id}')?.scrollIntoView({behavior:'smooth'})">
        <div class="epic-dot" style="background:${e.color}"></div>
        <span class="epic-nav-title">${e.title}</span>
        <span class="epic-nav-count">${epicDone}/${e.stories.length}</span>
      </div>`;
  }).join("");
}

// ── RENDER MAIN ───────────────────────────────────────────────────────────────
function renderMain() {
  document.getElementById("epicList").innerHTML = EPICS.map(epic => {
    const visibleStories = epic.stories.filter(s =>
      filterStatus === "all" || storyStatus[s.id] === filterStatus
    );
    if (visibleStories.length === 0 && filterStatus !== "all") return "";

    const epicDone = epic.stories.filter(s => storyStatus[s.id] === "done").length;
    const isOpen = expandedEpics[epic.id];
    const storiesToRender = filterStatus === "all" ? epic.stories : visibleStories;

    return `
      <div class="epic-block" id="${epic.id}">
        <div class="epic-header" style="border-left: 3px solid ${epic.color}" onclick="toggleEpic('${epic.id}')">
          <span class="epic-chevron">${isOpen ? "▾" : "▸"}</span>
          <div class="epic-header-body">
            <div class="epic-meta">
              <span class="epic-id" style="color:${epic.color}">${epic.id}</span>
              <span class="epic-title">${epic.title}</span>
            </div>
            <div class="epic-desc">${epic.description}</div>
          </div>
          <span class="epic-stories-count">${epicDone}/${epic.stories.length} stories</span>
        </div>

        ${isOpen ? `
          <div class="stories-list">
            ${storiesToRender.length === 0
              ? `<div class="no-stories">No hay stories con este estado</div>`
              : storiesToRender.map(story => {
                  const sc = STATUS_CONFIG[storyStatus[story.id]];
                  const pc = PRIORITY_CONFIG[story.priority];
                  const isSel = selectedStoryId === story.id;
                  return `
                    <div class="story-row ${isSel ? 'selected' : ''}"
                         onclick="selectStory('${story.id}')">
                      <div class="status-badge"
                           style="background:${sc.color}; color:${sc.text}"
                           onclick="event.stopPropagation(); cycleStatus('${story.id}')"
                           title="Click para cambiar estado">
                        ${sc.label}
                      </div>
                      <span class="story-id">${story.id}</span>
                      <span class="story-title">${story.title}</span>
                      <div class="story-right">
                        <span class="priority-label" style="color:${pc.color}">↑ ${pc.label}</span>
                        <span class="estimate-badge">${story.estimate}</span>
                      </div>
                    </div>`;
                }).join("")
            }
          </div>` : ""}
      </div>`;
  }).join("");
}

// ── RENDER DETAIL ─────────────────────────────────────────────────────────────
function renderDetail() {
  const panel = document.getElementById("detail");
  if (!selectedStoryId) { panel.classList.remove("open"); return; }

  const story = allStories().find(s => s.id === selectedStoryId);
  const epic  = EPICS.find(e => e.stories.some(s => s.id === selectedStoryId));
  if (!story || !epic) { panel.classList.remove("open"); return; }

  const sc = STATUS_CONFIG[storyStatus[story.id]];
  const pc = PRIORITY_CONFIG[story.priority];

  document.getElementById("detailRef").innerHTML =
    `<span style="color:${epic.color}">${epic.id} · ${story.id}</span>`;

  document.getElementById("detailTitle").textContent = story.title;

  document.getElementById("detailMeta").innerHTML = `
    <span class="detail-badge" style="background:${sc.color}; color:${sc.text}">${sc.label}</span>
    <span class="detail-badge" style="background:#21262d; color:${pc.color}">↑ ${pc.label}</span>
    <span class="detail-badge" style="background:#21262d; color:#7d8590">⏱ ${story.estimate}</span>`;

  document.getElementById("detailDesc").textContent = story.description;

  document.getElementById("detailAcceptance").innerHTML = story.acceptance.map(c => `
    <div class="acceptance-item">
      <span class="acceptance-check">✓</span>
      <span class="acceptance-text">${c}</span>
    </div>`).join("");

  document.getElementById("detailStack").innerHTML =
    story.stack.map(s => `<span class="stack-tag">${s}</span>`).join("");

  document.getElementById("detailStatusBtns").innerHTML =
    Object.entries(STATUS_CONFIG).map(([val, cfg]) => {
      const isActive = storyStatus[story.id] === val;
      return `
        <button class="status-btn"
          style="background:${isActive ? cfg.color : '#21262d'}; color:${isActive ? cfg.text : '#7d8590'}; border: 1px solid ${isActive ? cfg.text + '40' : '#21262d'}"
          onclick="setStoryStatus('${story.id}', '${val}')">
          ${cfg.label}
        </button>`;
    }).join("");

  panel.classList.add("open");
}

function setStoryStatus(id, val) {
  storyStatus[id] = val;
  render();
  renderDetail();
}

// ── FULL RENDER ───────────────────────────────────────────────────────────────
function render() {
  renderSidebar();
  renderMain();
}

render();
</script>
</body>
</html>
