<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8fff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Center node -->
  <circle cx="24" cy="24" r="6" fill="url(#nodeGrad)" filter="url(#softglow)"/>
  <circle cx="24" cy="24" r="3.5" fill="#161b22"/>
  <circle cx="24" cy="24" r="1.8" fill="#2563eb"/>

  <!-- Top-left node -->
  <circle cx="7" cy="9" r="4" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="7" cy="9" r="2" fill="#161b22"/>
  <circle cx="7" cy="9" r="1" fill="#4f8fff"/>

  <!-- Top-right node -->
  <circle cx="41" cy="9" r="4" fill="#8b5cf6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="41" cy="9" r="2" fill="#161b22"/>
  <circle cx="41" cy="9" r="1" fill="#a78bfa"/>

  <!-- Bottom-left node -->
  <circle cx="7" cy="39" r="4" fill="#10b981" opacity="0.9" filter="url(#glow)"/>
  <circle cx="7" cy="39" r="2" fill="#161b22"/>
  <circle cx="7" cy="39" r="1" fill="#4ade80"/>

  <!-- Bottom-right node -->
  <circle cx="41" cy="39" r="4" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="41" cy="39" r="2" fill="#161b22"/>
  <circle cx="41" cy="39" r="1" fill="#2563eb"/>

  <!-- Connector lines -->
  <line x1="19" y1="19.5" x2="10.5" y2="12.5" stroke="#2563eb" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="29" y1="19.5" x2="37.5" y2="12.5" stroke="#8b5cf6" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="19" y1="28.5" x2="10.5" y2="35.5" stroke="#10b981" stroke-width="1.2" stroke-opacity="0.7"/>
  <line x1="29" y1="28.5" x2="37.5" y2="35.5" stroke="#2563eb" stroke-width="1.2" stroke-opacity="0.7"/>

  <!-- Cross connectors dashed -->
  <line x1="11" y1="9" x2="37" y2="9" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="2,2"/>
  <line x1="11" y1="39" x2="37" y2="39" stroke="#2563eb" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="2,2"/>
</svg>
