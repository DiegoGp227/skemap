<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <!-- Blue glow gradient for the icon -->
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8fff"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="1"/>
      <stop offset="100%" stop-color="#4f8fff" stop-opacity="0.4"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== ICON: Network / Schema map ===== -->
  <!-- Center node -->
  <circle cx="60" cy="60" r="10" fill="url(#nodeGrad)" filter="url(#softglow)"/>
  <circle cx="60" cy="60" r="6" fill="#161b22"/>
  <circle cx="60" cy="60" r="3" fill="#2563eb"/>

  <!-- Top-left node -->
  <circle cx="22" cy="28" r="6.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="22" cy="28" r="3.5" fill="#161b22"/>
  <circle cx="22" cy="28" r="1.8" fill="#4f8fff"/>

  <!-- Top-right node -->
  <circle cx="98" cy="28" r="6.5" fill="#8b5cf6" opacity="0.9" filter="url(#glow)"/>
  <circle cx="98" cy="28" r="3.5" fill="#161b22"/>
  <circle cx="98" cy="28" r="1.8" fill="#a78bfa"/>

  <!-- Bottom-left node -->
  <circle cx="22" cy="92" r="6.5" fill="#10b981" opacity="0.9" filter="url(#glow)"/>
  <circle cx="22" cy="92" r="3.5" fill="#161b22"/>
  <circle cx="22" cy="92" r="1.8" fill="#4ade80"/>

  <!-- Bottom-right node -->
  <circle cx="98" cy="92" r="6.5" fill="url(#nodeGrad)" filter="url(#glow)"/>
  <circle cx="98" cy="92" r="3.5" fill="#161b22"/>
  <circle cx="98" cy="92" r="1.8" fill="#2563eb"/>

  <!-- Connector lines: center to corners -->
  <line x1="51.5" y1="53.5" x2="27.5" y2="33" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="68.5" y1="53.5" x2="92.5" y2="33" stroke="#8b5cf6" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="51.5" y1="66.5" x2="27.5" y2="87" stroke="#10b981" stroke-width="1.5" stroke-opacity="0.7"/>
  <line x1="68.5" y1="66.5" x2="92.5" y2="87" stroke="#2563eb" stroke-width="1.5" stroke-opacity="0.7"/>

  <!-- Cross connector: top nodes -->
  <line x1="28.5" y1="28" x2="91.5" y2="28" stroke="#2563eb" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,3"/>
  <!-- Cross connector: bottom nodes -->
  <line x1="28.5" y1="92" x2="91.5" y2="92" stroke="#2563eb" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3,3"/>

  <!-- ===== WORDMARK ===== -->
  <!-- "ske" in light text, "map" with accent -->
  <text x="130" y="76"
    font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
    font-size="46"
    font-weight="700"
    letter-spacing="-1"
    fill="#e6edf3">ske</text>

  <text x="218" y="76"
    font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace"
    font-size="46"
    font-weight="700"
    letter-spacing="-1"
    fill="#2563eb"
    filter="url(#glow)">map</text>

  <!-- Tagline -->
  <text x="131" y="95"
    font-family="'SF Mono', 'Fira Code', monospace"
    font-size="11"
    font-weight="400"
    letter-spacing="3"
    fill="#7d8590">PROJECT MANAGER</text>
</svg>
